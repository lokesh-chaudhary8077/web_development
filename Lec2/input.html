<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h3>INPUT</h3>
    <fieldset>
        <legend>Details</legend>
    <label for="name">Name</label>
    <input type="text" id="name" placeholder="Enter the name">
    <br>
    <label for="pwd">Password</label>
    <input  autofocus="password" id="pwd" placeholder="Password">
    <br>
    <label for="em">Email</label>
    <input type="email" id="em">
    <br>
    <label for="tel">PhoneNo.</label>
    <input minlength="10" maxlength="10" type="tel" id="tel">
    <br>
    <label for="date">Date</label>
    <input type="date" id="date">
    <br>
    <hr>
    <label for="gen">Male</label>
    <input type="radio" id="gen" name="Gender">
    <br>
    <label for="gen">Female</label>
    <input type="radio" id="gen" name="Gender">
    <br>
    <label for="gen">Other</label>
    <input type="radio" id="gen" name="Gender">
    <hr>
    <br>
    <label for="text">TextArea</label>
    <textarea cols="12" rows="1" placeholder="TextArea" id="text"></textarea>
    <hr>
    <br>
    <label for="Day" >Select Day</label>
    <select id="Day">
        <option selected>Select</option>
        <option>monday</option>
        <option>Tuesday</option>
        <option>Wednesday</option>
        <option>Thrusday</option>
    </select>
    </fieldset>
</body>
</html>
