<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>✨ Glass Calculator</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div id="container">
        <!-- Display Screen -->
        <input type="text" id="display" placeholder="0" disabled />

        <!-- Button Grid -->
        <div class="button-grid">

            <!-- Row 1 -->
            <button class="gray-button">C</button>
            <button class="gray-button">**</button>
            <button class="gray-button">%</button>
            <button class="yellow-button">/</button>

            <!-- Row 2 -->
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="yellow-button">*</button>

            <!-- Row 3 -->
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="yellow-button">-</button>

            <!-- Row 4 -->
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="yellow-button">+</button>

            <!-- Row 5 -->
            <button class="zero">0</button>
            <button>.</button>
            <button class="yellow-button">=</button>

        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
