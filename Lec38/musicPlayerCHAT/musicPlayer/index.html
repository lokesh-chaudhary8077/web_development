<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Player</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://kit.fontawesome.com/39f599e647.js" crossorigin="anonymous"></script>
</head>
<body>
  <section id="container">
    <h1>🎶 Music Player</h1>

    <!-- Song Thumbnail -->
    <div id="cover-container">
      <img id="cover" src="./assets/song1.jpg" alt="Song Cover">
    </div>

    <!-- Song List -->
    <ul id="song-list"></ul>

    <!-- Player Controls -->
    <div id="play-section">
      <input type="range" id="progress" min="0" value="0">
      <div class="buttons">
        <button id="prev-btn"><i class="fa-solid fa-backward-step"></i></button>
        <button id="play-btn"><i class="fa-solid fa-circle-play"></i></button>
        <button id="next-btn"><i class="fa-solid fa-forward-step"></i></button>
      </div>
    </div>

    <!-- Volume Section -->
    <div id="volume-section">
      <button id="volume-btn"><i class="fa-solid fa-volume-high"></i></button>
      <input type="range" id="volume-slider" min="0" max="100" value="100">
    </div>
  </section>

  <script src="app.js"></script>
</body>
</html>
